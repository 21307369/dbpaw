name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  # Fast smoke tests run first to fail fast
  smoke:
    name: Smoke Tests (typecheck, lint, unit)
    runs-on: ubuntu-22.04
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Run smoke tests
        run: bun run typecheck && bun run lint && bun run test:unit && bun run test:service

  # macOS smoke tests (ARM runner, JS/TS tests are arch-independent)
  smoke-macos:
    name: Smoke Tests (macOS)
    runs-on: macos-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Run smoke tests
        run: bun run typecheck && bun run lint && bun run test:unit && bun run test:service

  rust-check:
    name: Rust Check
    runs-on: ubuntu-22.04
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev libssl-dev libkrb5-dev

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> src-tauri/target

      - name: Run rust check
        run: cargo check --manifest-path src-tauri/Cargo.toml

      - name: Run rust unit tests
        run: cargo test --manifest-path src-tauri/Cargo.toml --lib

  # macOS Rust check (ARM runner, cross-compile x86_64 target)
  rust-check-macos:
    name: Rust Check (macOS x86)
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rosetta 2 and x86_64 Homebrew
        run: |
          softwareupdate --install-rosetta --agree-to-license || true
          if [ ! -x /usr/local/bin/brew ]; then
            arch -x86_64 /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)" < /dev/null
          fi
          arch -x86_64 /usr/local/bin/brew install unixodbc

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin
          components: rustfmt

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> src-tauri/target

      - name: Run rust check (x86_64)
        env:
          RUSTFLAGS: -L /usr/local/lib
          PKG_CONFIG_PATH: /usr/local/lib/pkgconfig
          PKG_CONFIG_ALLOW_CROSS: "1"
        run: cargo check --manifest-path src-tauri/Cargo.toml --target x86_64-apple-darwin

      - name: Run rust unit tests (x86_64)
        env:
          RUSTFLAGS: -L /usr/local/lib
          PKG_CONFIG_PATH: /usr/local/lib/pkgconfig
          PKG_CONFIG_ALLOW_CROSS: "1"
        run: cargo test --manifest-path src-tauri/Cargo.toml --lib --target x86_64-apple-darwin
