name: Release macOS x86

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.1.5)"
        required: true
        type: string

jobs:
  build-macos-x86:
    permissions:
      contents: write
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # ── Install Rosetta 2 & x86_64 Homebrew for cross-compilation ──
      - name: Setup Rosetta 2 and x86_64 Homebrew
        run: |
          # Install Rosetta 2 (idempotent — safe to run even if already installed)
          softwareupdate --install-rosetta --agree-to-license || true

          # Install x86_64 Homebrew in /usr/local (alongside ARM Homebrew in /opt/homebrew)
          if [ ! -x /usr/local/bin/brew ]; then
            arch -x86_64 /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)" < /dev/null
          fi

          # Install x86_64 unixODBC
          arch -x86_64 /usr/local/bin/brew install unixodbc

      # ── ARM Homebrew deps (create-dmg is arch-independent) ──
      - name: Install ARM macOS dependencies
        run: brew install create-dmg

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install frontend dependencies
        run: bun install

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            src-tauri -> target

      - name: Build macOS x86_64
        shell: bash
        run: |
          set -euo pipefail
          bun run tauri build --target x86_64-apple-darwin --bundles dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Point the linker to x86_64 libraries
          RUSTFLAGS: -L /usr/local/lib
          PKG_CONFIG_PATH: /usr/local/lib/pkgconfig
          PKG_CONFIG_ALLOW_CROSS: "1"

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: DbPaw-x86_64-apple-darwin
          path: |
            src-tauri/target/x86_64-apple-darwin/release/bundle/dmg/*.dmg
          if-no-files-found: error

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/') || inputs.tag != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          name: ${{ inputs.tag || github.ref_name }}
          body: |
            ## DbPaw ${{ inputs.tag || github.ref_name }}

            ### macOS (x86_64)
            - 下载 `.dmg` 文件（见下方 Assets）

            ### 安装说明
            下载 `.dmg` 文件，双击挂载后拖动 DbPaw 到 Applications 文件夹即可。
          files: |
            src-tauri/target/x86_64-apple-darwin/release/bundle/dmg/*.dmg
          draft: false
          prerelease: false

