name: Release macOS x86

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.1.5)"
        required: true
        type: string

jobs:
  build-macos-x86:
    permissions:
      contents: read
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # ── Install Rosetta 2 & x86_64 Homebrew for cross-compilation ──
      - name: Setup Rosetta 2 and x86_64 Homebrew
        run: |
          # Install Rosetta 2 (idempotent — safe to run even if already installed)
          softwareupdate --install-rosetta --agree-to-license || true

          # Install x86_64 Homebrew in /usr/local (alongside ARM Homebrew in /opt/homebrew)
          if [ ! -x /usr/local/bin/brew ]; then
            arch -x86_64 /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)" < /dev/null
          fi

          # Install x86_64 unixODBC
          arch -x86_64 /usr/local/bin/brew install unixodbc

      # ── ARM Homebrew deps (create-dmg is arch-independent) ──
      - name: Install ARM macOS dependencies
        run: brew install create-dmg

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install frontend dependencies
        run: bun install

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            src-tauri -> target

      - name: Build macOS x86_64
        shell: bash
        run: |
          # Remove updater pubkey to skip signing (no private key configured)
          sed -i '' '/"pubkey"/d' src-tauri/tauri.conf.json
          bun run tauri build --target x86_64-apple-darwin --bundles app
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Point the linker to x86_64 libraries
          RUSTFLAGS: -L /usr/local/lib
          PKG_CONFIG_PATH: /usr/local/lib/pkgconfig
          PKG_CONFIG_ALLOW_CROSS: "1"

      - name: Normalize updater bundle name
        shell: bash
        run: |
          set -euo pipefail
          bundle_dir="src-tauri/target/x86_64-apple-darwin/release/bundle"
          src="$(find "$bundle_dir/macos" -maxdepth 1 -type f -name '*.app.tar.gz' | head -n 1 || true)"
          if [ -z "$src" ]; then
            echo "No .app.tar.gz found, skipping rename"
            exit 0
          fi
          dst="$bundle_dir/macos/DbPaw-x86_64-apple-darwin.app.tar.gz"
          if [ "$src" != "$dst" ] && [ ! -f "$dst" ]; then
            mv "$src" "$dst"
          fi
          if [ -f "${src}.sig" ] && [ ! -f "${dst}.sig" ]; then
            mv "${src}.sig" "${dst}.sig"
          fi

      - name: Generate updater metadata
        shell: bash
        env:
          TAG_NAME: ${{ inputs.tag || github.ref_name }}
          BUNDLE_DIR: src-tauri/target/x86_64-apple-darwin/release/bundle
          TARGET_TRIPLE: x86_64-apple-darwin
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import datetime
          import json
          import os
          import pathlib
          import sys

          bundle_dir = pathlib.Path(os.environ["BUNDLE_DIR"])
          target = os.environ["TARGET_TRIPLE"]
          tag = os.environ["TAG_NAME"]
          repo = os.environ["GITHUB_REPOSITORY"]
          base_url = f"https://github.com/{repo}/releases/download/{tag}"

          def pick(patterns):
              for pattern in patterns:
                  matches = sorted(bundle_dir.glob(pattern))
                  if matches:
                      return matches[0]
              return None

          platform = "darwin-x86_64"
          bundle = pick(["macos/*.app.tar.gz"])

          if bundle is None:
              print(f"No updater bundle found for target {target}", file=sys.stderr)
              raise SystemExit(1)

          sig_path = pathlib.Path(str(bundle) + ".sig")
          if not sig_path.exists():
              print("No signature file found, skipping updater metadata generation")
              sys.exit(0)

          signature = sig_path.read_text(encoding="utf-8").strip()
          pub_date = datetime.datetime.utcnow().replace(microsecond=0).isoformat() + "Z"
          url = f"{base_url}/{bundle.name}"

          data = {
              "version": tag,
              "notes": "See the assets to download this version and install.",
              "pub_date": pub_date,
              "platforms": {platform: {"url": url, "signature": signature}},
          }

          out_dir = pathlib.Path("updater-json")
          out_dir.mkdir(parents=True, exist_ok=True)
          out_path = out_dir / f"latest-{target}.json"
          out_path.write_text(json.dumps(data, ensure_ascii=False, indent=2) + "\n", encoding="utf-8")
          print(f"Wrote {out_path}")
          PY

      - name: Upload bundle artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bundle-x86_64-apple-darwin
          path: |
            src-tauri/target/x86_64-apple-darwin/release/bundle/macos/**/*.app.tar.gz*
          if-no-files-found: error

      - name: Upload updater metadata artifact
        if: hashFiles('updater-json/latest-x86_64-apple-darwin.json') != ''
        uses: actions/upload-artifact@v4
        with:
          name: updater-json-x86_64-apple-darwin
          path: updater-json/latest-x86_64-apple-darwin.json
          if-no-files-found: warn